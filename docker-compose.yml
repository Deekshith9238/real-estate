version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/nripropservices
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run db:push
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/nripropservices
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nripropservices
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d nripropservices" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
